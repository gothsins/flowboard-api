services:
  postgres:
    image: postgres:16-alpine
    container_name: flowboard-postgres
    environment:
      POSTGRES_DB: flowboard_db
      POSTGRES_USER: flowboard_user
      POSTGRES_PASSWORD: flowboard_pass
    ports:
      - "5433:5432"
    volumes:
      - flowboard_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowboard_user -d flowboard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  flowboard_pgdata:
