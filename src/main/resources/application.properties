# ==============================
# Aplicacao
# ==============================
spring.application.name=flowboard-api
server.port=8083

# ==============================
# Banco de dados (PostgreSQL via Docker Compose local)
# ==============================
spring.datasource.url=jdbc:postgresql://localhost:5433/flowboard_db
spring.datasource.username=flowboard_user
spring.datasource.password=flowboard_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==============================
# JWT
# ==============================
# Em producao, mover para variavel de ambiente (nao versionar segredo real)
jwt.secret=${JWT_SECRET:troque-este-segredo-em-producao-minimo-256-bits-1234567890}
jwt.expiration-ms=86400000

# ==============================
# Swagger / OpenAPI
# ==============================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ==============================
# Logging
# ==============================
logging.level.com.guilherme.flowboard_api=DEBUG
logging.level.org.springframework.web.socket=DEBUG
